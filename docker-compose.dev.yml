services:
  nats:
    image: ${NATS_IMAGE:-nats:2.11-alpine}
    command: ["-js", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  user-db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-user_service}
      POSTGRES_USER: ${USER_DB_USER:-user_service}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-user_service_dev}
    ports:
      - "${USER_DB_PORT:-6433}:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  news-db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${NEWS_DB_NAME:-news_service}
      POSTGRES_USER: ${NEWS_DB_USER:-news_service}
      POSTGRES_PASSWORD: ${NEWS_DB_PASSWORD:-news_service_dev}
    ports:
      - "${NEWS_DB_PORT:-6434}:5432"
    volumes:
      - news-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  redis-data:
  user-db-data:
  news-db-data:
